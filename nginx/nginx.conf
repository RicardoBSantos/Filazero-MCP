worker_processes auto;

events {
    worker_connections 1024;
}

http {
    log_format json_audit escape=json
        '{'
            '"time":"$time_iso8601",'
            '"remote_addr":"$remote_addr",'
            '"method":"$request_method",'
            '"uri":"$request_uri",'
            '"status":$status,'
            '"body_bytes":$body_bytes_sent,'
            '"request_time":$request_time,'
            '"upstream_response_time":"$upstream_response_time",'
            '"http_user_agent":"$http_user_agent",'
            '"http_x_tenant_id":"$http_x_tenant_id"'
        '}';

    access_log /var/log/nginx/access.log json_audit;

    limit_req_zone $binary_remote_addr zone=mcp_global:10m rate=30r/m;
    limit_req_zone $binary_remote_addr zone=mcp_strict:10m rate=10r/m;
    limit_req_status 429;

    server_tokens off;
    client_max_body_size 1m;

    gzip on;
    gzip_types application/json;

    include /etc/nginx/conf.d/*.conf;
}
